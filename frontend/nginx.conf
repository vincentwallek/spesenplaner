server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA routing - always serve index.html for unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to API Gateway
    location /api/ {
        proxy_pass http://api-gateway:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /token {
        proxy_pass http://api-gateway:8000/token;
        proxy_set_header Host $host;
    }

    location /register {
        proxy_pass http://api-gateway:8000/register;
        proxy_set_header Host $host;
    }

    location /users/me {
        proxy_pass http://api-gateway:8000/users/me;
        proxy_set_header Host $host;
    }
}
