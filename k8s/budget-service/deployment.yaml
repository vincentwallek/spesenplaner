apiVersion: apps/v1
kind: Deployment
metadata:
  name: budget-service
  namespace: reise-spesen-planer
  labels:
    app: budget-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: budget-service
  template:
    metadata:
      labels:
        app: budget-service
    spec:
      containers:
        - name: budget-service
          image: rsp/budget-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: REQUEST_SERVICE_URL
              value: "http://request-service:3001"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: KAFKA_PAYOUT_TOPIC
              value: "payout-requests"
            - name: DATABASE_URL
              value: "sqlite+aiosqlite:///./budget.db"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: budget-service-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: budget-service-pvc
  namespace: reise-spesen-planer
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: budget-service
  namespace: reise-spesen-planer
spec:
  selector:
    app: budget-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
---
# HPA: Mittlere Last, Kafka-Produktion ist leichtgewichtig
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: budget-service-hpa
  namespace: reise-spesen-planer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: budget-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
