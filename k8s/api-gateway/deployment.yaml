apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: reise-spesen-planer
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: rsp/api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: REQUEST_SERVICE_URL
              value: "http://request-service:3001"
            - name: APPROVAL_SERVICE_URL
              value: "http://approval-service:3002"
            - name: BUDGET_SERVICE_URL
              value: "http://budget-service:3003"
            - name: PAYOUT_SERVICE_URL
              value: "http://payout-service:3004"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: secret-key
            - name: ALLOWED_ORIGINS
              value: "*"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: reise-spesen-planer
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
# HPA: Gateway ist hochverfügbar, moderate Last
# minReplicas=2 für Ausfallsicherheit, CPU-Schwelle 70%
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: reise-spesen-planer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
