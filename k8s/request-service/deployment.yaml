apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-service
  namespace: reise-spesen-planer
  labels:
    app: request-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: request-service
  template:
    metadata:
      labels:
        app: request-service
    spec:
      containers:
        - name: request-service
          image: rsp/request-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: APPROVAL_GRPC_HOST
              value: "approval-service.reise-spesen-planer.svc.cluster.local.:50051"
            - name: DATABASE_URL
              value: "sqlite+aiosqlite:////tmp/request.db"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: request-service-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: request-service-pvc
  namespace: reise-spesen-planer
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: request-service
  namespace: reise-spesen-planer
spec:
  selector:
    app: request-service
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
# HPA: Höchste Last (Haupt-Einstiegspunkt), niedrigere Schwelle (60%)
# für frühzeitiges Scaling bei vielen CRUD-Operationen
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: request-service-hpa
  namespace: reise-spesen-planer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: request-service
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
