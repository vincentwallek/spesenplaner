apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rsp-ingress
  namespace: reise-spesen-planer
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: spesen.local
      http:
        paths:
          # API Gateway — alle API-Anfragen
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /token
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /register
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          # Frontend — alle anderen Anfragen
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
